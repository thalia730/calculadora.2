<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <title>
        calculadora.2
    </title>
</head>

<body>
    <h2>
        CALCULADORA
    </h2>
    <input type="number" id="num1" placeholder="numero1">
    <input type="number" id="num2" placeholder="numero2">

    <br><br>

    <button id="soma" onclick="somar()">somar</button>
    <button id="mult" onclick="multiplicar()">multiplicar</button>
    <button id="sub" onclick="subtrair()">subtrair</button>
    <button id="div" onclick="dividir()">dividir</button>
    <button onclick="testarSomar()">Teste Soma</button>
    <button onclick="testarSubtrair()">Teste Subtração</button>
    <button onclick="testarMultiplicar()">Teste Multiplicação</button>
    <button onclick="testarDividir()">Teste Divisão</button>
    <div id="resultado"></div>

    <script>
        function somar() {
            const n1 = parseFloat(document.getElementById("num1").value);
            const n2 = parseFloat(document.getElementById("num2").value);

            if (isNaN(n1) || isNaN(n2)) {
                document.getElementById("resultado").innerHTML =
                    "Por favor, digite números válidos.";
            } else {
                document.getElementById("resultado").innerHTML =
                    "Resultado: " + (n1 + n2);
            }
        }
        function multiplicar() {
            const n1 = parseFloat(document.getElementById("num1").value);
            const n2 = parseFloat(document.getElementById("num2").value);

            if (isNaN(n1) || isNaN(n2)) {
                document.getElementById("resultado").innerHTML =
                    "Por favor, digite números válidos.";
            } else {
                document.getElementById("resultado").innerHTML =
                    "Resultado:" + (n1 * n2);
            }
        }
        function subtrair() {
            const n1 = parseFloat(document.getElementById("num1").value);
            const n2 = parseFloat(document.getElementById("num2").value);

            if (isNaN(n1) || isNaN(n2)) {
                document.getElementById("resultado").innerHTML =
                    "Por favor, digite números válidos.";
            } else {
                document.getElementById("resultado").innerHTML =
                    "Resultado:" + (n1 - n2);
            }
        }
        function dividir() {
            const n1 = parseFloat(document.getElementById("num1").value);
            const n2 = parseFloat(document.getElementById("num2").value);

            if (isNaN(n1) || isNaN(n2)) {
                document.getElementById("resultado").innerHTML =
                    "Por favor, digite números válidos.";
            } else {
                document.getElementById("resultado").innerHTML =
                    "Resultado:" + (n1 / n2);
            }
        }
        function testarSomar() {
            document.getElementById("num1").value = "melancia";
            document.getElementById("num2").value = "4";
            somar();
            document.getElementById("resultado").innerHTML =
                "Teste Soma com texto → Deve dar erro";
        }
        function testarSubtrair() {
            document.getElementById("num1").value = "abc";
            document.getElementById("num2").value = "2";
            subtrair();
            document.getElementById("resultado").innerHTML =
                "Teste Subtração com texto → Deve dar erro";
        }
        function testarMultiplicar() {
            document.getElementById("num1").value = "banana";
            document.getElementById("num2").value = "5";
            multiplicar();
            document.getElementById("resultado").innerHTML =
                "Teste Multiplicação com texto → Deve dar erro";
        }
        function testarDividir() {
            document.getElementById("num1").value = "laranja";
            document.getElementById("num2").value = "2";
            dividir();
            document.getElementById("resultado").innerHTML =
                "Teste Divisão com texto → Deve dar erro";
        }
        // FUNÇÃO DE TESTE
        function testar(nome, fn) {
            try {
                fn();
                console.log("certo " + nome);
            } catch (erro) {
                console.error("erro " + nome + " -> " + erro.message);
            }
        }
        testar("Teste simples", () => {
            if (2 + 2 !== 4) throw new Error("Erro");
        });
        //  TESTE 2: Inputs existem
        testar("Inputs devem existir", () => {
            if (!document.getElementById("num1")) throw new Error("Input num1 não encontrado");
            if (!document.getElementById("num2")) throw new Error("Input num2 não encontrado");
        });
        // TESTE 3:botões existem
        testar("Botões devem existir", () => {
            if (!document.getElementById("soma")) throw new Error("Botão soma não encontrado");
            if (!document.getElementById("sub")) throw new Error("Botão sub não encontrado");
            if (!document.getElementById("mult")) throw new Error("Botão mult não encontrado");
            if (!document.getElementById("div")) throw new Error("Botão div não encontrado");
        });
    </script>
</body>

</html>
